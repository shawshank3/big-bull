services:
  - type: web
    name: big-bull
    runtime: node
    buildCommand: pnpm install && pnpm --filter ui build
    startCommand: pnpm --filter api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '4000'
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES
        sync: false
      - key: JWT_REFRESH_EXPIRES
        sync: false
      - key: GEMENI_API_KEY
        sync: false
      # Alpha Vantage removed — no external API key required for market endpoints
